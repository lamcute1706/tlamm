<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel Table</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Hotel Table</h2>

<button class="btn btn-primary mb-3" id="addHotel">Create</button>

<table class="table table-bordered">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Image</th>
<th>Description</th>
<th>Location</th>
<th>Booking Date</th>
<th>Price</th>
<th>Action</th>
</tr>
</thead>

<tbody id="productTableBody">

</tbody>

</table>

</div>

<script src="hotel.js"></script>

</body>
</html>
